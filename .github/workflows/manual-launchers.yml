name: Manual Windows Launcher Build

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build launchers from (branch, tag, or SHA)"
        required: true
        default: "master"
        type: string

jobs:
  windows-launchers:
    runs-on: windows-latest

    steps:
      - name: Checkout ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install build tools (Ant + Launch4j)
        shell: pwsh
        run: |
          choco install ant launch4j --no-progress -y

      - name: Resolve Launch4j executable path
        shell: pwsh
        run: |
          $candidates = @(
            "$env:ChocolateyInstall\\lib\\launch4j\\tools\\launch4j\\launch4jc.cmd",
            "$env:ChocolateyInstall\\lib\\launch4j\\tools\\launch4j\\launch4jc.exe",
            "${env:ProgramFiles(x86)}\\Launch4j\\launch4jc.cmd",
            "${env:ProgramFiles(x86)}\\Launch4j\\launch4jc.exe",
            "$env:ProgramFiles\\Launch4j\\launch4jc.cmd",
            "$env:ProgramFiles\\Launch4j\\launch4jc.exe"
          )

          $launch4jExe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $launch4jExe) {
            $cmd = Get-Command launch4jc.cmd -ErrorAction SilentlyContinue
            if (-not $cmd) {
              $cmd = Get-Command launch4jc.exe -ErrorAction SilentlyContinue
            }
            if ($cmd) {
              $launch4jExe = $cmd.Source
            }
          }

          if (-not $launch4jExe) {
            throw "Unable to locate launch4jc.exe after installing Launch4j"
          }

          "LAUNCH4J_EXE=$launch4jExe" >> $env:GITHUB_ENV
          Write-Host "Launch4j executable: $launch4jExe"

      - name: Build fatjar and launcher executables
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/org/apache/ivy/ivy/2.5.2/ivy-2.5.2.jar" -OutFile "ivy.jar"
          $antArgs = @(
            '-lib',
            'ivy.jar',
            "-Dlaunch4j.executable=$env:LAUNCH4J_EXE",
            'clean',
            'resolve',
            'fatjar',
            'launch4j-all'
          )
          & ant @antArgs

      - name: Verify launcher jar references
        shell: pwsh
        run: |
          $targets = @(
            'installer/msi/openfilebot.exe',
            'installer/msi/openfilebot.launcher.exe',
            'installer/msi/openfilebot.platform.launcher.exe',
            'installer/portable/openfilebot.portable.launcher.exe'
          )

          foreach ($file in $targets) {
            if (-not (Test-Path $file)) {
              throw "Expected launcher not found: $file"
            }

            $content = [System.Text.Encoding]::ASCII.GetString([System.IO.File]::ReadAllBytes($file))
            if ($content -notmatch 'openfilebot\.jar') {
              throw "Launcher does not reference openfilebot.jar: $file"
            }
          }

      - name: Upload launcher artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openfilebot-windows-launchers-${{ github.sha }}
          if-no-files-found: error
          path: |
            installer/msi/openfilebot*.exe
            installer/appx/openfilebot*.exe
            installer/portable/openfilebot*.exe
