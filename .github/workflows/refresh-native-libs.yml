name: Refresh Native Linux Libraries

on:
  workflow_dispatch:
    inputs:
      mediainfo_version:
        description: "MediaInfo version (default from script if empty)"
        required: false
        type: string
      zen_version:
        description: "ZenLib version (default from script if empty)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-linux-amd64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool make gcc g++ pkg-config \
            curl tar xz-utils binutils

      - name: Optionally override script versions
        if: inputs.mediainfo_version != '' || inputs.zen_version != ''
        run: |
          if [ -n "${{ inputs.mediainfo_version }}" ]; then
            sed -i "s/^MEDIAINFO_VERSION=\".*\"/MEDIAINFO_VERSION=\"${{ inputs.mediainfo_version }}\"/" lib/native/build-mediainfo-minimal.sh
          fi

          if [ -n "${{ inputs.zen_version }}" ]; then
            sed -i "s/^ZEN_VERSION=\".*\"/ZEN_VERSION=\"${{ inputs.zen_version }}\"/" lib/native/build-mediainfo-minimal.sh
          fi

      - name: Build and deploy linux-amd64 native libs
        run: |
          chmod +x lib/native/build-mediainfo-minimal.sh
          ./lib/native/build-mediainfo-minimal.sh --deploy-linux-amd64

      - name: Remove temporary build directory
        run: |
          rm -rf tmp-mediainfo-minimal

      - name: Write checksums
        run: |
          sha256sum lib/native/linux-amd64/libmediainfo.so > lib/native/linux-amd64/libmediainfo.so.sha256
          sha256sum lib/native/linux-amd64/libzen.so > lib/native/linux-amd64/libzen.so.sha256

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(native): refresh linux-amd64 mediainfo libs"
          title: "chore(native): refresh linux-amd64 MediaInfo/Zen libs"
          body: |
            Automated refresh of `lib/native/linux-amd64` native libraries.

            Changes include:
            - Updated `libmediainfo.so`
            - Updated `libzen.so`
            - Updated SHA-256 checksum files

            Generated by workflow `${{ github.workflow }}` run `${{ github.run_id }}`.
          branch: chore/refresh-native-libs-amd64-${{ github.run_id }}
          add-paths: |
            lib/native/build-mediainfo-minimal.sh
            lib/native/linux-amd64/libmediainfo.so
            lib/native/linux-amd64/libzen.so
            lib/native/linux-amd64/libmediainfo.so.sha256
            lib/native/linux-amd64/libzen.so.sha256
          signoff: false
          delete-branch: true

  refresh-linux-aarch64:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool make gcc g++ pkg-config \
            curl tar xz-utils binutils

      - name: Optionally override script versions
        if: inputs.mediainfo_version != '' || inputs.zen_version != ''
        run: |
          if [ -n "${{ inputs.mediainfo_version }}" ]; then
            sed -i "s/^MEDIAINFO_VERSION=\".*\"/MEDIAINFO_VERSION=\"${{ inputs.mediainfo_version }}\"/" lib/native/build-mediainfo-minimal.sh
          fi

          if [ -n "${{ inputs.zen_version }}" ]; then
            sed -i "s/^ZEN_VERSION=\".*\"/ZEN_VERSION=\"${{ inputs.zen_version }}\"/" lib/native/build-mediainfo-minimal.sh
          fi

      - name: Build and deploy linux-armv8 native libs
        run: |
          chmod +x lib/native/build-mediainfo-minimal.sh
          ./lib/native/build-mediainfo-minimal.sh --deploy-linux-armv8

      - name: Remove temporary build directory
        run: |
          rm -rf tmp-mediainfo-minimal

      - name: Write checksums
        run: |
          sha256sum lib/native/linux-armv8/libmediainfo.so > lib/native/linux-armv8/libmediainfo.so.sha256
          sha256sum lib/native/linux-armv8/libzen.so > lib/native/linux-armv8/libzen.so.sha256

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(native): refresh linux-armv8 mediainfo libs"
          title: "chore(native): refresh linux-armv8 MediaInfo/Zen libs"
          body: |
            Automated refresh of `lib/native/linux-armv8` native libraries.

            Changes include:
            - Updated `libmediainfo.so`
            - Updated `libzen.so`
            - Updated SHA-256 checksum files

            Generated by workflow `${{ github.workflow }}` run `${{ github.run_id }}`.
          branch: chore/refresh-native-libs-aarch64-${{ github.run_id }}
          add-paths: |
            lib/native/build-mediainfo-minimal.sh
            lib/native/linux-armv8/libmediainfo.so
            lib/native/linux-armv8/libzen.so
            lib/native/linux-armv8/libmediainfo.so.sha256
            lib/native/linux-armv8/libzen.so.sha256
          signoff: false
          delete-branch: true
