name: Manual Release Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build (example: v0.9.0)"
        required: true
        type: string
      publish_release:
        description: "Publish a GitHub Release with built artifacts"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark GitHub Release as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Ant and Ivy
        run: |
          sudo apt-get update
          sudo apt-get install -y ant ivy gnupg

      - name: Build fatjar and Debian packages
        run: ant -lib /usr/share/java/ivy.jar clean resolve fatjar deb

      - name: Validate signing secrets
        env:
          RELEASE_GPG_PRIVATE_KEY_B64: ${{ secrets.RELEASE_GPG_PRIVATE_KEY_B64 }}
          RELEASE_GPG_KEY_ID: ${{ secrets.RELEASE_GPG_KEY_ID }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          [ -n "$RELEASE_GPG_PRIVATE_KEY_B64" ] || { echo "Missing secret: RELEASE_GPG_PRIVATE_KEY_B64"; exit 1; }
          [ -n "$RELEASE_GPG_KEY_ID" ] || { echo "Missing secret: RELEASE_GPG_KEY_ID"; exit 1; }
          [ -n "$RELEASE_GPG_PASSPHRASE" ] || { echo "Missing secret: RELEASE_GPG_PASSPHRASE"; exit 1; }

      - name: Import GPG signing key
        env:
          RELEASE_GPG_PRIVATE_KEY_B64: ${{ secrets.RELEASE_GPG_PRIVATE_KEY_B64 }}
        run: |
          echo "$RELEASE_GPG_PRIVATE_KEY_B64" | base64 --decode | gpg --batch --import

      - name: Sign artifacts
        env:
          RELEASE_GPG_KEY_ID: ${{ secrets.RELEASE_GPG_KEY_ID }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          for f in dist/*.jar dist/*.deb dist/*.changes; do
            [ -f "$f" ] || continue
            gpg --batch --yes --pinentry-mode loopback --passphrase "$RELEASE_GPG_PASSPHRASE" \
              --local-user "$RELEASE_GPG_KEY_ID" --armor --detach-sign "$f"
          done

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openfilebot-release-${{ inputs.tag }}
          if-no-files-found: error
          path: |
            dist/*.jar
            dist/*.deb
            dist/*.changes
            dist/*.asc

      - name: Publish GitHub Release
        if: inputs.publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            dist/*.jar
            dist/*.deb
            dist/*.changes
            dist/*.asc
