name: Manual Release Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build (example: 0.9.1)"
        required: true
        type: string
      publish_release:
        description: "Publish a GitHub Release with built artifacts"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark GitHub Release as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Derive release version from tag
        run: |
          TAG_VERSION="${{ inputs.tag }}"
          TAG_VERSION="${TAG_VERSION#v}"

          if ! echo "$TAG_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$'; then
            echo "Invalid tag/version '${{ inputs.tag }}' (normalized: $TAG_VERSION). Expected e.g. 0.9.1 or v0.9.1"
            exit 1
          fi

          echo "RELEASE_VERSION=$TAG_VERSION" >> "$GITHUB_ENV"
          echo "Release version: $TAG_VERSION"

      - name: Install Ant and Ivy
        run: |
          sudo apt-get update
          sudo apt-get install -y ant ivy gnupg

      - name: Build fatjar and Debian packages
        run: ant -lib /usr/share/java/ivy.jar -Dapplication.version="${RELEASE_VERSION}" clean resolve fatjar deb

      - name: Validate signing secrets
        env:
          RELEASE_GPG_PRIVATE_KEY_B64: ${{ secrets.RELEASE_GPG_PRIVATE_KEY_B64 }}
          RELEASE_GPG_KEY_ID: ${{ secrets.RELEASE_GPG_KEY_ID }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          [ -n "$RELEASE_GPG_PRIVATE_KEY_B64" ] || { echo "Missing secret: RELEASE_GPG_PRIVATE_KEY_B64"; exit 1; }
          [ -n "$RELEASE_GPG_KEY_ID" ] || { echo "Missing secret: RELEASE_GPG_KEY_ID"; exit 1; }
          [ -n "$RELEASE_GPG_PASSPHRASE" ] || { echo "Missing secret: RELEASE_GPG_PASSPHRASE"; exit 1; }

      - name: Import GPG signing key
        env:
          RELEASE_GPG_PRIVATE_KEY_B64: ${{ secrets.RELEASE_GPG_PRIVATE_KEY_B64 }}
        run: |
          echo "$RELEASE_GPG_PRIVATE_KEY_B64" | base64 --decode | gpg --batch --import

      - name: Sign artifacts
        env:
          RELEASE_GPG_KEY_ID: ${{ secrets.RELEASE_GPG_KEY_ID }}
          RELEASE_GPG_PASSPHRASE: ${{ secrets.RELEASE_GPG_PASSPHRASE }}
        run: |
          for f in dist/*.jar dist/*.deb; do
            [ -f "$f" ] || continue
            gpg --batch --yes --pinentry-mode loopback --passphrase "$RELEASE_GPG_PASSPHRASE" \
              --local-user "$RELEASE_GPG_KEY_ID" --armor --detach-sign "$f"
          done

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openfilebot-release-${{ inputs.tag }}
          if-no-files-found: error
          path: |
            dist/*.jar
            dist/*.deb
            dist/*.asc

      - name: Publish GitHub Release
        if: inputs.publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            dist/*.jar
            dist/*.deb
            dist/*.asc

  windows-installer-build:
    runs-on: windows-latest
    needs: release-build

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Derive release version from tag
        shell: pwsh
        run: |
          $tagVersion = '${{ inputs.tag }}'
          $tagVersion = $tagVersion.TrimStart('v')

          if ($tagVersion -notmatch '^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$') {
            throw "Invalid tag/version '${{ inputs.tag }}' (normalized: $tagVersion). Expected e.g. 0.9.1 or v0.9.1"
          }

          "RELEASE_VERSION=$tagVersion" >> $env:GITHUB_ENV
          Write-Host "Release version: $tagVersion"

      - name: Install build tools (Ant + WiX + Launch4j)
        shell: pwsh
        run: |
          choco install ant wixtoolset launch4j --no-progress -y

      - name: Resolve Launch4j executable path
        shell: pwsh
        run: |
          $candidates = @(
            "$env:ChocolateyInstall\\lib\\launch4j\\tools\\launch4j\\launch4jc.cmd",
            "$env:ChocolateyInstall\\lib\\launch4j\\tools\\launch4j\\launch4jc.exe",
            "${env:ProgramFiles(x86)}\\Launch4j\\launch4jc.cmd",
            "${env:ProgramFiles(x86)}\\Launch4j\\launch4jc.exe",
            "$env:ProgramFiles\\Launch4j\\launch4jc.cmd",
            "$env:ProgramFiles\\Launch4j\\launch4jc.exe"
          )

          $launch4jExe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $launch4jExe) {
            $cmd = Get-Command launch4jc.cmd -ErrorAction SilentlyContinue
            if (-not $cmd) {
              $cmd = Get-Command launch4jc.exe -ErrorAction SilentlyContinue
            }
            if ($cmd) {
              $launch4jExe = $cmd.Source
            }
          }

          if (-not $launch4jExe) {
            throw "Unable to locate launch4jc.exe after installing Launch4j"
          }

          $launch4jHome = Split-Path -Parent $launch4jExe
          $launch4jRunner = Join-Path $env:RUNNER_TEMP 'launch4j-java.cmd'

          $runnerLines = @(
            '@echo off',
            'set "L4J_HOME=' + $launch4jHome + '"',
            '"%JAVA_HOME%\bin\java.exe" -cp "%L4J_HOME%\launch4j.jar;%L4J_HOME%\lib\*" net.sf.launch4j.Main %*'
          )
          $runnerLines | Set-Content -Path $launch4jRunner -Encoding ASCII

          "LAUNCH4J_EXE=$launch4jRunner" >> $env:GITHUB_ENV
          Write-Host "Launch4j executable: $launch4jRunner"
          Write-Host "Launch4j home: $launch4jHome"

      - name: Build fatjar and MSI installers
        shell: pwsh
        run: |
          $wixPaths = @(
            "C:\Program Files (x86)\WiX Toolset v3.14\bin",
            "C:\Program Files (x86)\WiX Toolset v3.11\bin"
          )
          foreach ($p in $wixPaths) {
            if (Test-Path $p) {
              "$p" >> $env:GITHUB_PATH
            }
          }

          Invoke-WebRequest -Uri "https://repo1.maven.org/maven2/org/apache/ivy/ivy/2.5.2/ivy-2.5.2.jar" -OutFile "ivy.jar"
          $antArgs = @(
            '-lib',
            'ivy.jar',
            "-Dapplication.version=$env:RELEASE_VERSION",
            "-Dlaunch4j.executable=$env:LAUNCH4J_EXE",
            'clean',
            'resolve',
            'fatjar',
            'msi'
          )
          & ant @antArgs

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openfilebot-windows-installer-${{ inputs.tag }}
          if-no-files-found: error
          path: |
            dist/*.msi

      - name: Publish MSI to GitHub Release
        if: inputs.publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            dist/*.msi
