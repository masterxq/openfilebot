name: Manual Release Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build (example: v0.9.0)"
        required: true
        type: string
      publish_release:
        description: "Publish a GitHub Release with built artifacts"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark GitHub Release as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Ant and Ivy
        run: |
          sudo apt-get update
          sudo apt-get install -y ant ivy

      - name: Build fatjar and Debian packages
        run: ant -lib /usr/share/java/ivy.jar clean resolve fatjar deb

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openfilebot-release-${{ inputs.tag }}
          if-no-files-found: error
          path: |
            dist/*.jar
            dist/*.deb
            dist/*.changes

      - name: Publish GitHub Release
        if: inputs.publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          files: |
            dist/*.jar
            dist/*.deb
            dist/*.changes
